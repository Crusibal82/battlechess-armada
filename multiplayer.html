<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battlechess Armada Lobbies</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="multiplayer.css" />
  </head>
  <body class="lobby-page">
    <main class="app-shell">
      <section class="topbar">
        <div>
          <h1>Battlechess Armada</h1>
          <p id="statusLine">Choose a lobby, pick a fleet color, and wait for your opponent.</p>
        </div>
        <div class="toolbar">
          <span id="playerBadge" class="player-badge">Not logged in</span>
          <a
            class="survey-link"
            href="https://forms.office.com/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAO__RHa0UxUQlUyV1VXVlBPVkJEQzBBR0daMk5JQThXOC4u"
            target="_blank"
            rel="noopener noreferrer"
          >Post-Play Survey</a>
          <button id="refreshButton" type="button">Refresh</button>
          <button id="logoutButton" type="button">Logout</button>
        </div>
      </section>

      <section class="lobby-layout">
        <section class="panel lobby-panel">
          <h2>Available Lobbies</h2>
          <div id="lobbyList" class="lobby-list"></div>
        </section>

        <aside class="panel room-panel">
          <h2>Selected Lobby</h2>
          <div id="roomSummary" class="ship-card muted">Select a lobby to see seats.</div>
          <div class="phase-actions">
            <button id="joinBlueButton" type="button" disabled>Join Blue</button>
            <button id="joinRedButton" type="button" disabled>Join Red</button>
            <button id="leaveButton" type="button" disabled>Leave</button>
          </div>
          <a id="enterGameLink" class="enter-link" href="#" hidden>Enter game room</a>
        </aside>
      </section>

      <section id="adminPanel" class="panel admin-panel" hidden>
        <div class="panel-heading">
          <h2>Admin Watch</h2>
          <button id="refreshAdminButton" type="button">Refresh Admin View</button>
        </div>
        <div id="activeGamesList" class="admin-list"></div>
        <h2>Bug Reports</h2>
        <div id="bugReportsList" class="admin-list"></div>
      </section>
    </main>

    <dialog id="bugReportDialog" class="bug-report-dialog">
      <form id="bugReportForm" method="dialog" class="panel">
        <h2>Report a Bug</h2>
        <p id="bugReportLobby" class="muted">Lobby</p>
        <label>
          <span>Short Title</span>
          <input id="bugReportTitle" maxlength="120" placeholder="What went wrong?" />
        </label>
        <label>
          <span>Details</span>
          <textarea id="bugReportDetails" maxlength="3000" required placeholder="What happened, what phase were you in, and what did you expect?"></textarea>
        </label>
        <div class="phase-actions">
          <button id="submitBugReportButton" type="submit">Submit Report</button>
          <button id="cancelBugReportButton" type="button">Cancel</button>
        </div>
      </form>
    </dialog>

    <script src="multiplayer.js"></script>
  </body>
</html>
