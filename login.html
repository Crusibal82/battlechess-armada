<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battlechess Armada Login</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="multiplayer.css" />
  </head>
  <body class="login-page">
    <main class="app-shell auth-shell">
      <section class="topbar">
        <div>
          <h1>Battlechess Armada</h1>
          <p id="statusLine">Enter a display name to join the lobby list.</p>
        </div>
      </section>

      <section class="auth-layout">
        <form id="loginForm" class="panel auth-card">
          <h2>Enter Lobbies</h2>
          <label>
            <span>Username</span>
            <input name="username" maxlength="32" autocomplete="username" required />
          </label>
          <button type="submit">Enter Lobbies</button>
        </form>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
